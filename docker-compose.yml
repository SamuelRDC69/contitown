services:
  supabase-db:
    image: supabase/postgres:15.8.1.041
    container_name: contitown-supabase-db
    ports:
      - "54322:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - supabase-db-data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  supabase-studio:
    image: supabase/studio:20250101-84c0842
    container_name: contitown-supabase-studio
    ports:
      - "54323:3000"
    environment:
      SUPABASE_URL: http://supabase-kong:8000
      STUDIO_PG_META_URL: http://supabase-meta:8080
      DEFAULT_ORGANIZATION_NAME: contitown
      DEFAULT_PROJECT_NAME: contitown
    depends_on:
      supabase-db:
        condition: service_healthy

volumes:
  supabase-db-data:
